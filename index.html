<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Order Dispatch | Terraboost</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCDYgNIGcfWPxoux2EILXr60ZK0fZYJPR4&libraries=geometry"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .brand-blue { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); }
        .form-card { border-radius: 12px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        #map { height: 300px; width: 100%; border-radius: 12px; border: 1px solid #e2e8f0; }
        label { color: #64748b; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.65rem; display: block; margin-bottom: 4px; }
        input, textarea, select { border: 1px solid #e2e8f0; border-radius: 8px !important; padding: 10px; font-size: 14px; width: 100%; background: #ffffff; }
        .signature-font { font-family: 'Dancing Script', cursive; font-size: 2.5rem; color: #1e293b; border-bottom: 2px solid #cbd5e1; background: transparent; width: 100%; }
        .status-pill { transition: all 0.2s; cursor: pointer; border: 2px solid transparent; }
        input[type="radio"]:checked + .status-pill { border-color: currentColor; transform: scale(1.05); ring: 2px; ring-offset: 2px; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="p-4 md:p-12">

    <div id="captureArea" class="max-w-4xl mx-auto form-card bg-white border border-gray-100 text-slate-800">
        <div class="brand-blue p-8 text-white flex justify-between items-center no-print text-white">
            <div class="flex items-center gap-4 text-white">
                <div class="bg-white/10 p-3 rounded-xl font-extrabold text-2xl border border-white/20 text-center w-14">TB</div>
                <div>
                    <h1 class="text-2xl font-bold leading-tight">Work Order Dispatch</h1>
                    <p class="text-slate-400 text-[10px] uppercase font-bold tracking-widest opacity-80 text-white">Certified Record of Authorization</p>
                </div>
            </div>
        </div>

        <form id="dispatchForm" class="p-8 space-y-8">
            
            <div id="setupFields" class="space-y-6">
                <h3 class="text-xs font-black text-blue-600 uppercase tracking-widest border-b border-blue-100 pb-3">1. Dispatch Configuration</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div><label>Dispatcher Email</label><input type="email" id="d_email" placeholder="logistics@terraboost.com"></div>
                    <div><label>Contractor Name (IC)</label><input type="text" id="ic_name_setup" placeholder="Full Name"></div>
                    <div><label>Contractor Email</label><input type="email" id="ic_email_setup" placeholder="worker@email.com"></div>
                    <div><label>Work Order #</label><input type="text" id="task_num" placeholder="WO-0000"></div>
                    <div><label>Compensation ($)</label><input type="number" id="comp" placeholder="0.00"></div>
                    <div><label>Due Date</label><input type="date" id="due_date"></div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
                    <div class="space-y-4">
                        <label class="text-blue-600 font-black">Route Locations</label>
                        <textarea id="locations" rows="6" placeholder="Addresses here..." oninput="calculateRoute()"></textarea>
                        
                        <div class="bg-slate-900 rounded-2xl p-6 text-white flex justify-between items-center shadow-xl">
                            <div><p class="text-slate-400 text-[10px] uppercase font-black tracking-widest">Mileage</p><span id="mileage_display" class="text-3xl font-black text-emerald-400">0.0</span></div>
                            <div class="text-right"><p class="text-slate-400 text-[10px] uppercase font-black tracking-widest">Drive Time</p><span id="time_display" class="text-3xl font-black text-blue-400">--</span></div>
                        </div>
                    </div>
                    <div><div id="map"></div></div>
                </div>

                <button type="button" onclick="generateCertifiedLink()" class="w-full brand-blue text-white font-bold py-4 rounded-xl shadow-lg text-xs uppercase tracking-widest hover:opacity-90">
                    🚀 Dispatch Certified Verification Link
                </button>
            </div>

            <div id="icMode" class="hidden space-y-8">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                    <div class="space-y-6">
                        <h3 class="text-sm font-black text-slate-800 uppercase border-b pb-2">Work Order Authorization</h3>
                        
                        <div class="flex gap-4 no-print">
                            <label class="flex-1">
                                <input type="radio" name="status" value="Accepted" class="hidden" onchange="toggleDecision('Accepted')" checked>
                                <div class="status-pill bg-emerald-50 text-emerald-700 border-emerald-200 p-4 rounded-xl text-center font-bold text-xs uppercase tracking-widest ring-emerald-500">Accept Task</div>
                            </label>
                            <label class="flex-1">
                                <input type="radio" name="status" value="Declined" class="hidden" onchange="toggleDecision('Declined')">
                                <div class="status-pill bg-red-50 text-red-700 border-red-200 p-4 rounded-xl text-center font-bold text-xs uppercase tracking-widest ring-red-500">Decline Task</div>
                            </label>
                        </div>

                        <button type="button" onclick="viewRoute()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-black py-4 rounded-xl text-[10px] uppercase tracking-widest no-print">
                            View Optimized Route
                        </button>

                        <div id="summaryZone" class="bg-slate-50 p-6 rounded-2xl border border-slate-100 space-y-3 text-sm text-slate-700"></div>
                    </div>

                    <div class="space-y-6">
                        <div id="acceptFields" class="space-y-6">
                            <div><label class="text-blue-600 font-black">Electronic Signature</label><input type="text" id="typed_sig" oninput="updateSigPreview()" placeholder="Full Legal Name" class="signature-font border-none focus:ring-0"></div>
                            <div class="flex items-start gap-3 p-4 bg-slate-50 rounded-xl border border-slate-200"><input type="checkbox" id="legal_consent" class="mt-1 h-5 w-5 rounded border-gray-300 text-blue-600 cursor-pointer"><label for="legal_consent" class="normal-case font-medium text-[11px] text-slate-600 leading-tight cursor-pointer italic">I certify that I have reviewed the work order and authorize this task.</label></div>
                        </div>

                        <div id="declineFields" class="hidden space-y-4">
                            <label class="text-red-600 font-black">Reason for Denial</label>
                            <textarea id="decline_reason" rows="4" placeholder="Please specify why you are declining (e.g., schedule conflict, rate counter-offer)..."></textarea>
                        </div>

                        <div class="text-right border-t pt-4"><label>Action Date</label><span id="dateDisplay" class="font-bold text-slate-800 text-sm"></span></div>
                        <button type="button" id="submitBtn" onclick="submitAuthorization()" class="w-full bg-blue-600 text-white font-bold py-5 rounded-xl shadow-lg text-xs uppercase tracking-widest transition-colors">Submit Decision</button>
                    </div>
                </div>
            </div>

            <div id="auditTrail" class="hidden mt-10 pt-6 border-t border-slate-100 space-y-2 text-[8px] text-slate-400 font-mono uppercase">
                <p class="font-bold text-blue-600 text-[10px] mb-2">Verification Certificate</p>
                <div class="grid grid-cols-2 gap-4"><div><p id="audit_id"></p><p id="audit_ts"></p></div><div class="text-right"><p id="audit_ua"></p></div></div>
            </div>

            <div id="successView" class="hidden text-center py-12 space-y-4">
                <div class="text-6xl text-slate-800">✅</div>
                <h2 class="text-2xl font-bold uppercase tracking-tight">Response Recorded</h2>
                <p id="success_msg" class="text-slate-500">The dispatcher has been notified of your decision.</p>
            </div>
        </form>
    </div>

    <script>
        let map, directionsService, directionsRenderer;
        function initMap() {
            map = new google.maps.Map(document.getElementById('map'), { zoom: 4, center: { lat: 39.8, lng: -98.5 }, disableDefaultUI: true });
            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer({ map: map });
        }

        function calculateRoute() {
            const lines = document.getElementById('locations').value.split('\n').filter(l => l.trim().length > 5);
            if (lines.length < 2) return;
            directionsService.route({
                origin: lines[0], destination: lines[lines.length - 1],
                waypoints: lines.slice(1, -1).map(loc => ({ location: loc, stopover: true })),
                optimizeWaypoints: true, travelMode: google.maps.TravelMode.DRIVING, unitSystem: google.maps.UnitSystem.IMPERIAL
            }, (result, status) => {
                if (status === "OK") {
                    directionsRenderer.setDirections(result);
                    let meters = 0; result.routes[0].legs.forEach(leg => { meters += leg.distance.value; });
                    document.getElementById('mileage_display').innerText = (meters * 0.000621371).toFixed(1);
                    document.getElementById('time_display').innerText = result.routes[0].legs[0].duration.text;
                }
            });
        }

        function toggleDecision(choice) {
            if (choice === 'Accepted') {
                document.getElementById('acceptFields').classList.remove('hidden');
                document.getElementById('declineFields').classList.add('hidden');
                document.getElementById('submitBtn').classList.replace('bg-red-600', 'bg-blue-600');
            } else {
                document.getElementById('acceptFields').classList.add('hidden');
                document.getElementById('declineFields').classList.remove('hidden');
                document.getElementById('submitBtn').classList.replace('bg-blue-600', 'bg-red-600');
            }
        }

        function generateCertifiedLink() {
            const d = {
                de: document.getElementById('d_email').value,
                icn: document.getElementById('ic_name_setup').value,
                ice: document.getElementById('ic_email_setup').value,
                wo: document.getElementById('task_num').value,
                comp: document.getElementById('comp').value,
                mi: document.getElementById('mileage_display').innerText,
                locs: document.getElementById('locations').value.split('\n').filter(l => l.trim().length > 2).join('|')
            };
            if (!d.de || !d.icn || !d.wo) return alert("Required fields missing.");

            // BASE64 ENCODING FOR STABILITY
            const payload = btoa(unescape(encodeURIComponent(JSON.stringify(d))));
            const link = `${window.location.origin}${window.location.pathname}?data=${payload}`;
            
            navigator.clipboard.writeText(link);
            window.location.href = `mailto:${d.ice}?subject=Action Required: WO#${d.wo}&body=Review and respond here: ${link}`;
            alert("Certified Link Copied!");
        }

        window.onload = () => {
            initMap();
            const params = new URLSearchParams(window.location.search);
            const rawData = params.get('data');
            if (rawData) {
                try {
                    const d = JSON.parse(decodeURIComponent(escape(atob(rawData))));
                    document.getElementById('setupFields').remove();
                    document.getElementById('icMode').classList.remove('hidden');
                    document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString();
                    document.getElementById('summaryZone').innerHTML = `
                        <div class="flex justify-between"><strong>Contractor:</strong> <span>${d.icn}</span></div>
                        <div class="flex justify-between text-blue-600"><strong>Work Order #:</strong> <span class="font-bold">${d.wo}</span></div>
                        <div class="flex justify-between"><strong>Mileage:</strong> <span>${d.mi} Miles</span></div>
                        <div class="flex justify-between border-t pt-2 mt-2"><strong>Compensation:</strong> <span class="text-emerald-600 font-black">$${d.comp}</span></div>
                    `;
                    window.payloadData = d;
                } catch(e) { console.error("Data decode error"); }
            }
        };

        function viewRoute() {
            const stops = window.payloadData.locs.split('|');
            const url = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(stops[0])}&destination=${encodeURIComponent(stops[stops.length-1])}&waypoints=${encodeURIComponent(stops.slice(1,-1).join('|'))}&travelmode=driving`;
            window.open(url, '_blank');
        }

        function updateSigPreview() { document.getElementById('sig_name_preview').innerText = document.getElementById('typed_sig').value || "the signatory"; }

        async function submitAuthorization() {
            const status = document.querySelector('input[name="status"]:checked').value;
            const name = document.getElementById('typed_sig').value;
            const reason = document.getElementById('decline_reason').value;

            if (status === 'Accepted' && (!name || !document.getElementById('legal_consent').checked)) return alert("Review and signature required to accept.");
            if (status === 'Declined' && !reason) return alert("Please provide a reason for declining.");

            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "Processing...";

            const ts = new Date().toISOString();
            const txID = `CERT-${window.payloadData.wo}-${Math.random().toString(36).substr(2, 4).toUpperCase()}`;

            document.getElementById('auditTrail').classList.remove('hidden');
            document.getElementById('audit_id').innerText = `ID: ${txID}`;
            document.getElementById('audit_ts').innerText = `TS: ${ts}`;
            document.getElementById('audit_ua').innerText = `ENV: ${navigator.userAgent.substring(0, 40)}`;

            const formData = new FormData();
            // FORM SPREE SUBJECT LINE
            formData.append('_subject', `WO ${window.payloadData.wo} ${status.toUpperCase()}`);
            
            formData.append('Decision Status', status);
            formData.append('Work Order', window.payloadData.wo);
            formData.append('Contractor', window.payloadData.icn);
            
            if (status === 'Accepted') {
                formData.append('Signatory', name);
                formData.append('Compensation', window.payloadData.comp);
            } else {
                formData.append('Reason for Denial', reason);
            }
            
            formData.append('Verification ID', txID);
            formData.append('_replyto', window.payloadData.de);

            try {
                await fetch('https://formspree.io/f/meerlqll', { method: 'POST', body: formData, headers: {'Accept': 'application/json'} });
                
                if (status === 'Accepted') {
                    await html2pdf().set({ margin: 0.5, filename: `WO_CERT_${window.payloadData.wo}.pdf`, jsPDF: { format: 'letter' } }).from(document.getElementById('captureArea')).save();
                }
                
                document.getElementById('icMode').style.display = 'none';
                document.getElementById('successView').classList.remove('hidden');
                if (status === 'Declined') document.getElementById('success_msg').innerText = "Dispatcher notified of your denial.";
            } catch (e) { btn.disabled = false; alert("Submission failed."); }
        }
    </script>
</body>
</html>
