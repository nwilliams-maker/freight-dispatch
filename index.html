<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freight Acknowledgement | Terraboost</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { background-color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .brand-blue { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); }
        .form-card { border-radius: 12px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        label { color: #64748b; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.65rem; display: block; margin-bottom: 4px; }
        canvas { width: 100%; height: 200px; background: #fff; border: 2px dashed #cbd5e1; border-radius: 12px; cursor: crosshair; }
        input { border: 1px solid #e2e8f0; border-radius: 8px !important; padding: 10px; font-size: 14px; width: 100%; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="p-4 md:p-12">

    <div id="captureArea" class="max-w-4xl mx-auto form-card bg-white border border-gray-100">
        <div class="brand-blue p-8 text-white flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="bg-white/10 p-3 rounded-xl font-extrabold text-2xl border border-white/20 text-center w-14">TB</div>
                <div>
                    <h1 class="text-2xl font-bold leading-tight">Freight Acknowledgement</h1>
                    <p class="text-slate-400 text-[10px] uppercase font-bold tracking-widest opacity-80">Logistics & Shipment Acceptance</p>
                </div>
            </div>
        </div>

        <form id="freightForm" class="p-8 space-y-8">
            
            <div id="setupFields" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-4">
                    <div><label>Your Dispatch Email</label><input type="email" id="d_email" placeholder="dispatch@terraboost.com"></div>
                    <div><label>Freight Carrier</label><input type="text" id="carrier" placeholder="e.g. FedEx / R&L"></div>
                    <div><label>BOL / Tracking #</label><input type="text" id="bol_num" placeholder="PRO #"></div>
                </div>
                <div class="space-y-4">
                    <div><label>Work Order #</label><input type="text" id="task_num" placeholder="WO-0000"></div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label>Pallets</label><input type="number" id="pallets" value="0"></div>
                        <div><label>Kiosks</label><input type="number" id="kiosks" value="0"></div>
                    </div>
                    <div><label>Delivery Address</label><input type="text" id="delivery_addr" placeholder="Full Address"></div>
                </div>
                <div class="md:col-span-2 pt-4">
                    <button type="button" onclick="generateHandshake()" class="w-full brand-blue text-white font-bold py-4 rounded-xl shadow-lg text-xs uppercase tracking-widest">
                        🚀 Send Handshake Link to IC
                    </button>
                </div>
            </div>

            <div id="icMode" class="hidden space-y-8">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                    <div class="space-y-6">
                        <h3 class="text-sm font-black text-slate-800 uppercase border-b pb-2">Shipment Summary</h3>
                        <div id="summaryZone" class="bg-slate-50 p-6 rounded-2xl border border-slate-100 space-y-4 text-sm"></div>
                        <div class="p-4 bg-amber-50 rounded-xl border border-amber-100 text-[11px] text-amber-800">
                            <strong>Notice:</strong> IC acknowledges receipt in good condition. Pallets left on-site.
                        </div>
                    </div>

                    <div class="space-y-4">
                        <label class="text-blue-600 font-black italic">IC Signature</label>
                        <div class="relative">
                            <canvas id="sigCanvas"></canvas>
                            <div id="sigOverlay" class="absolute inset-0 flex items-center justify-center pointer-events-none text-slate-300 font-bold uppercase text-[10px]">Sign Here</div>
                        </div>
                        <div class="flex justify-between items-center">
                            <button type="button" onclick="signaturePad.clear()" class="text-[10px] text-slate-400 font-bold uppercase">Clear</button>
                            <span id="dateDisplay" class="font-bold text-slate-800 text-sm"></span>
                        </div>
                        <button type="button" id="submitBtn" onclick="submitData()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg text-xs uppercase tracking-widest">
                            Finalize & Submit
                        </button>
                    </div>
                </div>
            </div>

            <div id="successView" class="hidden text-center py-12 space-y-4">
                <div class="text-6xl">✅</div>
                <h2 class="text-2xl font-bold text-slate-800 uppercase">Submitted</h2>
                <p class="text-slate-500">Dispatch notified. PDF downloaded.</p>
            </div>
        </form>
    </div>

    <script>
        let signaturePad;
        const canvas = document.getElementById('sigCanvas');

        window.onload = () => {
            signaturePad = new SignaturePad(canvas, { penColor: '#1e293b' });
            canvas.addEventListener('mousedown', () => document.getElementById('sigOverlay').style.display = 'none');
            
            const params = new URLSearchParams(window.location.search);
            if (params.get('mode') === 'sign') {
                document.getElementById('setupFields').style.display = 'none';
                document.getElementById('icMode').classList.remove('hidden');
                document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString();
                
                document.getElementById('summaryZone').innerHTML = `
                    <div class="flex justify-between"><strong>Carrier:</strong> <span>${params.get('carrier')}</span></div>
                    <div class="flex justify-between"><strong>Work Order:</strong> <span>${params.get('wo')}</span></div>
                    <div class="flex justify-between"><strong>Kiosks/Pallets:</strong> <span>${params.get('k')}/${params.get('p')}</span></div>
                    <div class="pt-2 border-t"><strong>Address:</strong><br>${params.get('addr')}</div>
                `;
            }
        };

        function generateHandshake() {
            const baseUrl = window.location.href.split('?')[0];
            const link = `${baseUrl}?mode=sign&carrier=${encodeURIComponent(document.getElementById('carrier').value)}&wo=${encodeURIComponent(document.getElementById('task_num').value)}&k=${document.getElementById('kiosks').value}&p=${document.getElementById('pallets').value}&addr=${encodeURIComponent(document.getElementById('delivery_addr').value)}&de=${encodeURIComponent(document.getElementById('d_email').value)}`;
            
            window.location.href = `mailto:?subject=Sign WO#${document.getElementById('task_num').value}&body=Sign here: ${link}`;
        }

        async function submitData() {
            if (signaturePad.isEmpty()) return alert("Please sign.");
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "Sending...";

            const params = new URLSearchParams(window.location.search);
            const formData = new FormData();
            formData.append('Work Order', params.get('wo'));
            formData.append('Signature', signaturePad.toDataURL());
            formData.append('_replyto', params.get('de'));

            await fetch('https://formspree.io/f/xgonzegv', { method: 'POST', body: formData, headers: {'Accept': 'application/json'} });

            html2pdf().set({ margin: 0.5, filename: `WO_${params.get('wo')}.pdf`, jsPDF: { format: 'letter' } })
            .from(document.getElementById('captureArea')).save();

            document.getElementById('icMode').style.display = 'none';
            document.getElementById('successView').classList.remove('hidden');
        }
    </script>
</body>
</html>
